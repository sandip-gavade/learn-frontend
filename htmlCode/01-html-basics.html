<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HTML Basics</title>
</head>

<body>

    <!-- ====================================== -->
    <!-- BASIC STRUCTURE -->
    <!-- ====================================== -->

    <h1>Welcome to HTML</h1>

    <p>
        HTML stands for HyperText Markup Language.
    </p>


    <!-- ====================================== -->
    <!-- HEADINGS -->
    <!-- ====================================== -->

    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>


    <!-- ====================================== -->
    <!-- TEXT FORMATTING -->
    <!-- ====================================== -->

    <h2>Text Formatting</h2>

    <b>Bold Text</b>
    <br><br>

    <strong>Strong Text</strong>
    <br><br>

    <i>Italic Text</i>
    <br><br>

    <u>Underline Text</u>
    <br><br>

    <mark>Highlighted Text</mark>
    <br><br>

    H<sub>2</sub>O
    <br><br>

    X<sup>2</sup>


    <!-- ====================================== -->
    <!-- LINKS -->
    <!-- ====================================== -->

    <h2>Links</h2>

    <a href="https://google.com">
        Open Google
    </a>


    <!-- ====================================== -->
    <!-- IMAGE -->
    <!-- ====================================== -->

    <h2>Image</h2>

    <img
        src="https://via.placeholder.com/200"
        alt="Sample Image"
    >

</body>

</html>
