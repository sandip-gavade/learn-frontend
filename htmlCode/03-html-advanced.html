<!DOCTYPE html>
<html>

<head>
    <title>Advanced HTML</title>
</head>

<body>

    <!-- ====================================== -->
    <!-- FORM -->
    <!-- ====================================== -->

    <h1>Registration Form</h1>

    <form>

        <label>Full Name</label>
        <br>

        <input
            type="text"
            placeholder="Enter Name"
        >

        <br><br>

        <label>Email</label>
        <br>

        <input
            type="email"
            placeholder="Enter Email"
        >

        <br><br>

        <label>Password</label>
        <br>

        <input
            type="password"
            placeholder="Enter Password"
        >

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>


    <!-- ====================================== -->
    <!-- SEMANTIC HTML -->
    <!-- ====================================== -->

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>

        <section>

            <h2>About Us</h2>

            <p>
                We teach web development.
            </p>

        </section>

        <article>

            <h2>Latest News</h2>

            <p>
                HTML semantic tags improve SEO.
            </p>

        </article>

    </main>

    <footer>
        <p>Copyright 2026</p>
    </footer>


    <!-- ====================================== -->
    <!-- AUDIO -->
    <!-- ====================================== -->

    <h1>Audio</h1>

    <audio controls>

        <source
            src="sample.mp3"
            type="audio/mpeg"
        >

    </audio>


    <!-- ====================================== -->
    <!-- VIDEO -->
    <!-- ====================================== -->

    <h1>Video</h1>

    <video
        width="400"
        controls
    >

        <source
            src="sample.mp4"
            type="video/mp4"
        >

    </video>

</body>

</html>
