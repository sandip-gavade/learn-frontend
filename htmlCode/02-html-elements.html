<!DOCTYPE html>
<html>

<head>
    <title>HTML Elements</title>
</head>

<body>

    <!-- ====================================== -->
    <!-- LISTS -->
    <!-- ====================================== -->

    <h1>HTML Lists</h1>

    <h2>Ordered List</h2>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>

    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
    </ul>


    <!-- ====================================== -->
    <!-- TABLE -->
    <!-- ====================================== -->

    <h1>Student Table</h1>

    <table border="1">

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Sandip</td>
            <td>28</td>
            <td>Bangalore</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>25</td>
            <td>Mumbai</td>
        </tr>

    </table>


    <!-- ====================================== -->
    <!-- DIV -->
    <!-- ====================================== -->

    <h1>Div Example</h1>

    <div
        style="
            border: 1px solid black;
            padding: 20px;
            width: 250px;
        "
    >
        <h2>Student Card</h2>

        <p>Name: Sandip</p>

        <p>Course: JavaScript</p>
    </div>


    <!-- ====================================== -->
    <!-- SPAN -->
    <!-- ====================================== -->

    <h1>Span Example</h1>

    <p>
        This is
        <span style="color:red;">
            important
        </span>
        text.
    </p>

</body>

</html>
